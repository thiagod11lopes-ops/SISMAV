name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyD-LgIxiwDsNELFT6NB5wx6phMUKuoAK4Q
          VITE_FIREBASE_AUTH_DOMAIN: sismav-c5577.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: sismav-c5577
          VITE_FIREBASE_STORAGE_BUCKET: sismav-c5577.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '965225528661'
          VITE_FIREBASE_APP_ID: '1:965225528661:web:e845a811006275af29c3dc'

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
